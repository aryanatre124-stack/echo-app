<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: white; margin: 0; font-family: sans-serif; }
        .screen { display: none; min-height: 100vh; padding-bottom: 70px; }
        .active { display: block; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #000; border-top: 0.5px solid #262626; display: flex; justify-content: space-around; padding: 15px 0; z-index: 100; }
        .insta-border { border: 1px solid #262626; border-radius: 8px; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div id="home" class="screen active">
        <div class="p-4 flex justify-between items-center border-b border-gray-800 sticky top-0 bg-black z-50">
            <h1 class="text-2xl font-bold italic tracking-tighter">ECHO</h1>
            <i class="far fa-paper-plane text-xl" onclick="showScreen('dm')"></i>
        </div>
        <div class="p-2">
            <div class="insta-border overflow-hidden">
                <div class="p-3 flex items-center gap-2">
                    <div class="w-8 h-8 bg-gradient-to-tr from-yellow-400 to-fuchsia-600 rounded-full"></div>
                    <span class="font-bold text-xs">echo_creators</span>
                </div>
                <div class="h-96 bg-gray-900 flex items-center justify-center">
                    <i class="far fa-image text-4xl text-gray-700"></i>
                </div>
                <div class="p-3 flex gap-4 text-xl">
                    <i class="far fa-heart hover:text-red-500"></i>
                    <i class="far fa-comment"></i>
                </div>
            </div>
        </div>
    </div>

    <div id="dm" class="screen">
        <div class="p-4 flex items-center gap-4 border-b border-gray-800">
            <i class="fas fa-arrow-left" onclick="showScreen('home')"></i>
            <h1 class="text-xl font-bold">Direct</h1>
        </div>
        <div class="p-4">
            <div class="flex items-center gap-4 mb-6">
                <div class="relative">
                    <div class="w-14 h-14 bg-gray-800 rounded-full border border-gray-700"></div>
                    <div class="absolute -top-2 -right-2 bg-white text-black text-[10px] px-2 py-1 rounded-full font-bold">🎵 Hindi...</div>
                </div>
                <p class="text-sm text-gray-400">Your note</p>
            </div>
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 bg-blue-600 rounded-full"></div>
                <div><p class="font-bold">Bhai</p><p class="text-xs text-gray-500">GitHub par app live ho gaya!</p></div>
            </div>
        </div>
    </div>

    <div id="profile" class="screen">
        <div class="p-8 text-center">
            <div class="w-24 h-24 bg-gray-800 rounded-full mx-auto border-2 border-gray-700 flex items-center justify-center">
                <i class="fas fa-user text-4xl text-gray-600"></i>
            </div>
            <h2 class="text-xl font-bold mt-4">aryanatre124</h2>
            <p class="text-gray-400 text-sm mt-1">Echo Developer 🚀</p>
            <button class="mt-6 w-full bg-[#363636] py-2 rounded-lg font-bold text-sm">Edit Profile</button>
        </div>
    </div>

    <div class="nav-bar">
        <i class="fas fa-home text-xl" onclick="showScreen('home')"></i>
        <i class="fas fa-search text-xl"></i>
        <i class="fas fa-plus-square text-xl"></i>
        <i class="fas fa-user text-xl" onclick="showScreen('profile')"></i>
    </div>

    <script>
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
